<ion-header showReportHeader>
  <ion-toolbar>

    <!-- Left: menu + logo + page title -->
    <div class="header-left">
      <ion-menu-button></ion-menu-button>
      <div class="logo-container">
        <img src="assets/SDE.png" alt="Logo" class="toolbar-logo">
        <span class="toolbar-title">{{ currentTitle }}</span>
      </div>
    </div>

    <!-- Navigation buttons -->
    <ion-buttons slot="primary" class="nav-buttons">
      @for (btn of filteredHeaderButtons; track btn) {
        <ion-button
          fill="clear"
          size="small"
          class="nav-btn"
          [class.active]="isActive(btn.routerLink)"
          (click)="btn.action ? btn.action() : goToPage(btn.routerLink)">
          {{ btn.title }}
        </ion-button>
      }
    </ion-buttons>

    <!-- User info + logout -->
    <ion-buttons slot="end" class="user-actions">
      <div class="user-info-inline">
        <div class="user-name">{{ formattedUserName  }}</div>
        <div class="user-role">{{ displayRole }}</div>
        <div class="current-time">{{ currentTime }}</div>
      </div>
      <ion-button fill="clear" size="small" (click)="logout()" class="logout-btn">
        <img src="assets/logout.png" alt="Logout" class="logout-icon">
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>
