<ion-content fullscreen class="success-page">
  <div class="center-container">
    <ion-card>
      <ion-card-header>
        <ion-card-title>{{ title }}</ion-card-title>
        <ion-card-subtitle>{{ subtitle }}</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <ion-button expand="full" (click)="goToLogin()">
          Login
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
