<div class="background">
  <div class="center-container">

    <ion-card class="upload-card animate-fade">

      <!-- HEADER -->
      <ion-card-header class="card-header-special">
        <ion-card-title class="modal-title-special">
          Edit Profile
        </ion-card-title>
        <ion-card-subtitle>
          Update your profile information
        </ion-card-subtitle>
      </ion-card-header>

      <!-- FORM CONTENT -->
      <ion-card-content class="tr">

        <div class="form-container">

          <!-- Nama -->
          <ion-item class="input-item">
            <ion-label class="label" position="stacked">Name</ion-label>
            <ion-input
              type="text"
              [(ngModel)]="formData.name"
              required>
            </ion-input>
          </ion-item>

          <!-- Email & Reset Row -->
          <div class="email-action-row">

            <ion-button
              class="action-btn"
              (click)="startChangeEmail()">
              Change Email
            </ion-button>

            <ion-button
              class="action-btn reset-password-btn"
              (click)="openResetPasswordAlert()">
              Reset Password
            </ion-button>

          </div>

        </div>

        <!-- SAVE BUTTON -->
        <ion-button
          expand="full"
          class="save-btn"
          [disabled]="!hasChanges"
          (click)="save()">
          Change Name
        </ion-button>

        <!-- CANCEL BUTTON -->
        <ion-button
          expand="full"
          fill="outline"
          color="medium"
          (click)="dismiss()">
          Cancel
        </ion-button>

      </ion-card-content>

    </ion-card>

  </div>
</div>
