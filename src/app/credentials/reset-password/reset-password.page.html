<ion-content fullscreen class="animate-fade reset-page">
  <div class="background">
    <div class="center-container">

      <ion-card class="upload-card reset-card">

        <ion-card-header>
          <ion-card-title class="page-title">
            Reset Password
          </ion-card-title>
          <ion-card-subtitle>
            Enter your new password
          </ion-card-subtitle>
        </ion-card-header>

        <ion-card-content>
          <form [formGroup]="form" (ngSubmit)="onSubmit()">

            <!-- New Password -->
            <div class="form-group">
              <label class="outside-label">New Password</label>
              <ion-item fill="outline" class="input-item">
                <ion-input
                  type="password"
                  placeholder="New password"
                  formControlName="password">
                </ion-input>
              </ion-item>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
              <label class="outside-label">Confirm Password</label>
              <ion-item fill="outline" class="input-item">
                <ion-input
                  type="password"
                  placeholder="Repeat password"
                  formControlName="confirm">
                </ion-input>
              </ion-item>
            </div>

            <!-- Error -->
            <ion-text
              color="danger"
              class="error-text"
              *ngIf="form.invalid && form.touched">
              Password must be at least 6 characters
            </ion-text>

            <!-- Submit -->
            <ion-button
              expand="full"
              type="submit"
              [disabled]="form.invalid">

              <ion-label>
                Save Password
              </ion-label>

            </ion-button>

          </form>
        </ion-card-content>

      </ion-card>

    </div>
  </div>
</ion-content>
