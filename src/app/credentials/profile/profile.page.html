<app-header></app-header>

<ion-content class="ion-padding">
  <!-- Loading Spinner -->
  @if (loading) {
    <div class="spinner-overlay">
      <ion-spinner name="crescent"></ion-spinner>
    </div>
  }

  <!-- Profile Card -->
  @if (!loading && profile) {
    <div class="profile-card-special">
      <div class="profile-header">
        <h2>User Profile</h2>
      </div>

      <div class="profile-info">
        <div class="info-row">
          <span class="info-label">Name:</span>
          <span class="info-value">{{ profile.name }}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Email:</span>
          <span class="info-value">{{ profile.email }}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Role:</span>
          <span class="info-value">{{ roleLabelMap[profile?.role] || profile?.role }}</span>
        </div>
      </div>

      <ion-button expand="block" (click)="openEditModal()" class="manage-btn ion-margin-top">
        Edit Profile
      </ion-button>
    </div>
  }

  <!-- No Data Message -->
  @if (!loading && !profile) {
    <div class="no-data">
      Profile not found.
    </div>
  }
</ion-content>
