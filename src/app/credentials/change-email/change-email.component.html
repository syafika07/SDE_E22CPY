<div class="background">
  <div class="center-container">

    <ion-card class="upload-card animate-fade">

      <!-- HEADER -->
      <ion-card-header class="card-header-special">
        <ion-card-title class="modal-title-special">
          Change email address
        </ion-card-title>
        <ion-card-subtitle>
          {{ step === 1 ? 'Verify your password before change your email' : 'Enter new Email' }}
        </ion-card-subtitle>
      </ion-card-header>

      <!-- FORM CONTENT -->
      <ion-card-content class="tr">

        <div class="form-container">

          <!-- STEP 1: Confirm Password -->
          <div *ngIf="step === 1" class="form-group">
            <ion-item class="input-item" fill="outline">
              <ion-label class="label" position="stacked">Enter password</ion-label>
              <ion-input
                type="password"
                placeholder="Masukkan password"
                [(ngModel)]="password"
                autocomplete="current-password"
                (keydown.enter)="confirmPassword()">
              </ion-input>
            </ion-item>

            <ion-button
              expand="full"
              class="action-btn"
              [disabled]="loading || !password"
              (click)="confirmPassword()">
              <ng-container *ngIf="!loading">Confirm Password</ng-container>
              <ng-container *ngIf="loading">Memproses...</ng-container>
            </ion-button>
          </div>

          <!-- STEP 2: Input New Email -->
          <div *ngIf="step === 2" class="form-group">
            <ion-item class="input-item" fill="outline">
              <ion-label class="label" position="stacked">New Email</ion-label>
              <ion-input
                type="email"
                placeholder="Example@email.com"
                [(ngModel)]="newEmail"
                autocomplete="email">
              </ion-input>
            </ion-item>

            <ion-button
              expand="full"
              class="action-btn"
              [disabled]="loading || !newEmail"
              (click)="confirmChangeEmail()">
              <ng-container *ngIf="!loading">Confirm Change Email</ng-container>
              <ng-container *ngIf="loading">Processing...</ng-container>
            </ion-button>
          </div>

        </div>

        <!-- CANCEL BUTTON -->
        <ion-button
          expand="full"
          fill="outline"
          color="medium"
          class="mt-12"
          (click)="dismiss()">
          Cancel
        </ion-button>

      </ion-card-content>
    </ion-card>

  </div>
</div>
