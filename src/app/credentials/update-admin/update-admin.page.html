<app-header></app-header>

<ion-content class="ion-padding">
  <!-- Loading Spinner -->
  @if (loading) {
    <ion-spinner name="crescent"></ion-spinner>
  }

  <!-- Table Card -->
  @if (!loading && users.length > 0) {
    <div class="table-card-special">
      <table class="data-table">
        <thead>
          <tr>
            <th>Email</th>
            <th>Name</th>
            <th>Role</th>
            <th>Created At</th>
          </tr>
        </thead>
        <tbody>
          @for (user of users; track user) {
            <tr>
              <td>{{ user.email }}</td>
              <td>{{ user.name || '-' }}</td>
              <td>
                <ion-select [value]="user.role" (ionChange)="updateRole(user, $event.detail.value)">
                  <ion-select-option value="user">Operator</ion-select-option>
                  <ion-select-option value="admin">Admin</ion-select-option>
                  <ion-select-option value="proadmin">Super Admin</ion-select-option>
                  <ion-select-option value="editor">Info Editor</ion-select-option>
                </ion-select>
              </td>
              <td>{{ user.created_at | date:'short' }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }

  <!-- No Data Message -->
  @if (!loading && users.length === 0) {
    <div class="no-data">
      No users found.
    </div>
  }
</ion-content>
